name: mcpl
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch=2.1.*
  - torchvision=0.16.*
  - pytorch-cuda=12.1
  - numpy
  - scipy
  - matplotlib
  - pandas
  - pillow
  - tqdm
  - scikit-learn
  - pip:
      - accelerate
      - datasets
      - diffusers
      - transformers
      - safetensors
      - pytorch-lightning
      - torchmetrics
      - tensorboard
      - ftfy
      - einops
      - lpips
      - gdown
      - clip @ git+https://github.com/openai/CLIP.git
      - -r ./counterfactual-benchmark/requirements.txt

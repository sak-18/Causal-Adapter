# Reproducible conda environment for Causal-Adapter (SD1.5 + SD3 + benchmark).
#
# Pinned to the versions actually exercised on the cluster as of 2026-06-01.
# After `conda env create`, install the local diffusers fork in editable mode:
#
#     conda env create -f environment.yml
#     conda activate causal-adapter
#     pip install -e diffusers
#
# Notes:
# - `bitsandbytes` is required for `--use_8bit_adam` in `train_SD3.py`.
# - The local `diffusers/` fork (0.36.0.dev0) shadows the pip-installed one;
#   the editable install above is what `train.py` / `train_SD3.py` actually use.

name: causal-adapter
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.8.19
  - pytorch=2.4.1
  - torchvision=0.19.1
  - torchaudio=2.4.1
  - pytorch-cuda=12.1
  - pip
  - pip:
      - accelerate==1.0.1
      - transformers==4.46.3
      - tokenizers==0.20.3
      - safetensors==0.5.3
      - huggingface_hub==0.36.2
      - sentencepiece==0.2.0
      - bitsandbytes==0.45.5
      - pytorch-lightning==2.3.0
      - torchmetrics==1.4.0.post0
      - einops==0.8.1
      - ftfy
      - scikit-image==0.20.0
      - scikit-learn==1.3.2
      - opencv-python==4.2.0.34
      - matplotlib==3.7.2
      - seaborn==0.13.2
      - pandas==2.0.3
      - numpy==1.24.3
      - scipy==1.9.1
      - protobuf==5.29.6
      - tqdm==4.66.5
      - pillow==10.4.0
      - jupyterlab==4.2.5
      - ipykernel==6.29.5
      - networkx==3.1
      - wandb==0.24.2
      - tensorboard
      - lpips
      - gdown
      - clip @ git+https://github.com/openai/CLIP.git
